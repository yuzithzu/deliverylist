<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery System by gelocutler</title>
    <style>
        /* =========================================
           CSS STYLING - MODERN, SLEEK & THEMED
           ========================================= */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');

        /* LIGHT THEME VARIABLES (DEFAULT) */
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --bg: #e2e8f0;
            --card: #ffffff;
            --border: #cbd5e1;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --input-bg: #ffffff;
            --input-text: #0f172a;
            --summary-bg: #f0f9ff;
            --notes-bg: #fef2f2;
            --notes-border: #fca5a5;
            --notes-text: #ef4444;
            --success: #10b981;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
            --intro-bg: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        /* DARK THEME VARIABLES */
        [data-theme="dark"] {
            --primary: #f8fafc;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --bg: #020617; /* Very dark blue */
            --card: #0f172a; /* Slate 900 */
            --border: #334155; /* Slate 700 */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: #1e293b; /* Slate 800 */
            --input-text: #f8fafc;
            --summary-bg: #172554; /* Blue 950 */
            --notes-bg: #450a0a; /* Red 950 */
            --notes-border: #7f1d1d; /* Red 900 */
            --notes-text: #fca5a5; /* Red 300 */
            --danger-bg: #450a0a;
            --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.5);
            --intro-bg: linear-gradient(135deg, #020617 0%, #0f172a 100%);
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* FORCE UPPERCASE FOR ALL INPUTS */
        input, select, textarea {
            text-transform: uppercase !important;
            color: var(--input-text) !important;
        }

        /* =========================================
           THEME TOGGLE BUTTON
           ========================================= */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text-main);
            font-size: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* =========================================
           INTRO SCREEN STYLES
           ========================================= */
        #introScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--intro-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease-out;
            text-align: center;
        }

        .intro-title {
            font-size: 36px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .intro-creator {
            font-size: 16px;
            color: var(--text-muted);
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .intro-creator span {
            color: var(--accent);
            font-weight: 600;
        }

        .btn-enter {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            transition: all 0.3s ease;
        }

        .btn-enter:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        /* =========================================
           MAIN CONTENT STYLES
           ========================================= */
        #mainContent {
            display: none; 
            width: 100%;
            padding: 20px;
            justify-content: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .live-clock {
            text-align: right;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary);
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* TOP GRID DETAILS */
        .top-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 850px) {
            .top-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 500px) {
            .top-grid { grid-template-columns: 1fr; }
        }

        .input-group { display: flex; flex-direction: column; }
        .input-group label {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .input-group input, .input-group select {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            background-color: var(--input-bg);
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        /* LIST SECTION */
        .list-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .list-header-bar h2 { margin: 0; font-size: 16px; font-weight: 800; color: var(--primary); }

        .btn-add {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 800;
            font-size: 12px;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
        }
        .btn-add:hover { background-color: #059669; }

        /* TIGHTENED LIST CONTAINER - NO EXTRA SPACE */
        .list-container {
            padding: 0;
            background-color: transparent;
            border: none;
            margin-bottom: 30px;
            max-height: 450px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) var(--card);
        }

        /* ROW STYLING - UPDATED GRID PARA WALANG SPACE */
        .patient-row {
            display: grid;
            grid-template-columns: 30px 3fr 2fr 3fr 40px; /* 5 columns lang, mas balanse */
            gap: 10px;
            align-items: center;
            background: var(--input-bg);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 8px; 
        }

        .patient-row:hover { border-color: var(--accent); }

        @media (max-width: 950px) {
            .patient-row {
                grid-template-columns: 1fr;
                gap: 8px;
                padding: 15px;
            }
            .numbering { display: none; }
        }

        .numbering { font-weight: 800; color: var(--text-muted); text-align: center; font-size: 14px;}
        
        .patient-row input, .patient-row select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            background-color: var(--input-bg);
        }
        .patient-row input:focus, .patient-row select:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* DYNAMIC PAYMENT CELL - TANGGAL ANG PANGET NA SPACE */
        .payment-cell {
            display: flex;
            gap: 8px;
            width: 100%;
        }
        .payment-cell select {
            flex: 1; /* Sasakupin ang buong space kapag tago ang amount */
        }
        .amount-container {
            display: none; /* Tago muna */
            align-items: center;
            gap: 8px;
            flex: 1; /* Hahati sa space kapag lumabas */
        }
        .amount-container.show {
            display: flex; /* Lalabas kapag with excess */
        }
        .currency-label { 
            font-weight: 800; 
            font-size: 12px; 
            color: var(--text-muted);
        }

        .btn-remove {
            background-color: var(--danger-bg);
            color: var(--danger);
            border: 1px solid var(--notes-border);
            border-radius: 6px;
            height: 38px;
            cursor: pointer;
            font-weight: 800;
        }
        .btn-remove:hover { background-color: var(--danger); color: white; }

        /* =========================================
           SUMMARY / BIG TOTAL INVOICES IN CENTER
           ========================================= */
        .summary-box {
            background-color: var(--summary-bg);
            border: 2px dashed var(--accent);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .summary-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        .summary-label { 
            font-size: 16px; 
            font-weight: 800; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .summary-value { 
            font-size: 56px; 
            font-weight: 900; 
            color: var(--primary); 
            line-height: 1;
        }

        /* NOTES */
        .notes {
            text-align: center;
            font-size: 12px;
            color: var(--notes-text);
            font-weight: 800;
            padding: 15px;
            background-color: var(--notes-bg);
            border: 1px dashed var(--notes-border);
            border-radius: 8px;
            margin-bottom: 30px;
        }

        /* ACTION BUTTONS */
        .actions { display: flex; gap: 20px; }
        .btn-action {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-copy { background-color: #1e293b; }
        .btn-copy:hover { background-color: #0f172a; }
        [data-theme="dark"] .btn-copy { background-color: #334155; }
        [data-theme="dark"] .btn-copy:hover { background-color: #475569; }
        
        .btn-pdf { background-color: var(--accent); }
        .btn-pdf:hover { background-color: var(--accent-hover); }

        /* PRINT STYLES (Force light theme layout for printing) */
        @media print {
            * { color: black !important; background: transparent !important; border-color: black !important; text-shadow: none !important; box-shadow: none !important; }
            body { padding: 0; min-height: auto;}
            #introScreen, .theme-toggle { display: none !important; }
            #mainContent { display: block !important; padding: 0; }
            .container { border: none; padding: 0; max-width: 100%; }
            .summary-box { border: 1px solid #000 !important; border-radius: 0; padding: 20px; }
            .summary-value { font-size: 40px !important; }
            .list-container { max-height: none; overflow: visible; padding: 0; margin-bottom: 10px;}
            .patient-row { border: none; border-bottom: 1px solid #ccc !important; border-radius: 0; margin-bottom: 0; padding: 5px 0;}
            input, select { border: none !important; border-bottom: 1px solid #000 !important; border-radius: 0 !important; padding: 4px !important; appearance: none; -webkit-appearance: none; }
            .btn-add, .btn-remove, .actions { display: none !important; }
        }
    </style>
</head>
<body>

    <!-- THEME TOGGLE BUTTON -->
    <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">🌙</button>

    <!-- =========================================
         INTRO / SPLASH SCREEN
         ========================================= -->
    <div id="introScreen">
        <div class="intro-title">Delivery Management System</div>
        <div class="intro-creator">CREATED BY <span>gelocutler</span></div>
        <button class="btn-enter" onclick="enterSystem()">ENTER SYSTEM</button>
    </div>

    <!-- =========================================
         MAIN APPLICATION CONTENT
         ========================================= -->
    <div id="mainContent">
        <div class="container">
            
            <!-- LIVE CLOCK -->
            <div class="live-clock" id="clock">LOADING DATE & TIME...</div>

            <div class="header">
                <h1>FINAL LIST FOR DELIVERY</h1>
            </div>

            <!-- TOP LOGISTICS DETAILS -->
            <div class="top-grid">
                <div class="input-group">
                    <label>DATE</label>
                    <input type="date" id="valDate">
                </div>
                <div class="input-group">
                    <label>LOCATION</label>
                    <input type="text" id="valLocation" placeholder="E.G. BATANGAS">
                </div>
                <div class="input-group">
                    <label>PROCESSED BY</label>
                    <input type="text" id="valProcessor" placeholder="NAME OF STAFF">
                </div>
                <div class="input-group">
                    <label>SEND VIA</label>
                    <select id="valCourier">
                        <option value="BUS">BUS</option>
                        <option value="DHL">DHL</option>
                        <option value="AIRPLANE">AIRPLANE</option>
                        <option value="LBC">LBC</option>
                        <option value="J&T EXPRESS">J&T EXPRESS</option>
                        <option value="OTHERS">OTHERS</option>
                    </select>
                </div>
            </div>

            <!-- PATIENT & AGENCY LIST -->
            <div class="list-header-bar">
                <h2>PATIENTS & INVOICES</h2>
                <button class="btn-add" onclick="addRow()">+ ADD NEW ROW</button>
            </div>

            <div class="list-container" id="listContainer">
                <!-- Default Row -->
                <div class="patient-row">
                    <div class="numbering">1.</div>
                    <input type="text" class="in-name" placeholder="PATIENT NAME (E.G. DELA CRUZ, JUAN)">
                    <input type="text" class="in-agency" placeholder="AGENCY (E.G. PCSO)">
                    
                    <div class="payment-cell">
                        <select class="in-payment-type" onchange="toggleAmount(this)">
                            <option value="NO EXCESS">NO EXCESS PAYMENT</option>
                            <option value="WITH EXCESS">WITH EXCESS PAYMENT</option>
                        </select>
                        <div class="amount-container">
                            <span class="currency-label">PHP</span>
                            <input type="number" step="0.01" class="in-amount" placeholder="0.00">
                        </div>
                    </div>
                    
                    <button class="btn-remove" onclick="removeRow(this)">X</button>
                </div>
            </div>

            <!-- SUMMARY (TOTAL INVOICES IN CENTER BIG FONT) -->
            <div class="summary-box">
                <div class="summary-item">
                    <span class="summary-label">TOTAL INVOICES</span>
                    <span class="summary-value" id="totInvoices">1</span>
                </div>
            </div>

            <!-- NOTES -->
            <div class="notes">
                NOTES: DIRECT/GL PATIENTS SHOULD HAVE OFFICIAL RECEIPT OR COLLECTION RECEIPT ATTACHED ON SALES INVOICE.
            </div>

            <!-- ACTION BUTTONS -->
            <div class="actions">
                <button class="btn-action btn-copy" onclick="executeAction('copy')">📋 COPY DETAILS</button>
                <button class="btn-action btn-pdf" onclick="executeAction('pdf')">🖨️ EXPORT TO PDF</button>
            </div>

        </div>
    </div>

    <!-- =========================================
         JAVASCRIPT LOGIC
         ========================================= -->
    <script>
        // --- THEME LOGIC ---
        function toggleTheme() {
            const htmlElement = document.documentElement;
            const btn = document.getElementById('themeToggle');
            if (htmlElement.getAttribute('data-theme') === 'dark') {
                htmlElement.removeAttribute('data-theme');
                btn.innerText = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                htmlElement.setAttribute('data-theme', 'dark');
                btn.innerText = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('themeToggle').innerText = '☀️';
        }

        // --- INTRO SCREEN LOGIC ---
        function enterSystem() {
            const intro = document.getElementById('introScreen');
            const main = document.getElementById('mainContent');
            
            intro.style.opacity = '0';
            
            setTimeout(() => {
                intro.style.display = 'none';
                main.style.display = 'flex';
                updateClock();
                document.getElementById('valDate').valueAsDate = new Date();
                updateRowNumbers();
            }, 600);
        }

        // --- LIVE CLOCK SCRIPT ---
        function updateClock() {
            const clockEl = document.getElementById('clock');
            if(clockEl) {
                const now = new Date();
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute:'2-digit', second:'2-digit' };
                clockEl.innerText = now.toLocaleDateString('en-US', options).toUpperCase();
            }
        }
        setInterval(updateClock, 1000);

        // --- TOGGLE AMOUNT INPUT ---
        function toggleAmount(selectElement) {
            const row = selectElement.closest('.patient-row');
            const amountContainer = row.querySelector('.amount-container');
            const amountInput = row.querySelector('.in-amount');

            if (selectElement.value === "WITH EXCESS") {
                amountContainer.classList.add('show');
                amountInput.value = ""; 
                amountInput.focus();
            } else {
                amountContainer.classList.remove('show');
                amountInput.value = ""; 
            }
        }

        // --- ROW MANAGEMENT (ADD/REMOVE) ---
        function addRow() {
            const container = document.getElementById('listContainer');
            const newRow = document.createElement('div');
            newRow.className = 'patient-row';
            newRow.innerHTML = `
                <div class="numbering"></div>
                <input type="text" class="in-name" placeholder="PATIENT NAME">
                <input type="text" class="in-agency" placeholder="AGENCY">
                <div class="payment-cell">
                    <select class="in-payment-type" onchange="toggleAmount(this)">
                        <option value="NO EXCESS">NO EXCESS PAYMENT</option>
                        <option value="WITH EXCESS">WITH EXCESS PAYMENT</option>
                    </select>
                    <div class="amount-container">
                        <span class="currency-label">PHP</span>
                        <input type="number" step="0.01" class="in-amount" placeholder="0.00">
                    </div>
                </div>
                <button class="btn-remove" onclick="removeRow(this)">X</button>
            `;
            container.appendChild(newRow);
            container.scrollTop = container.scrollHeight;
            updateRowNumbers();
        }

        function removeRow(btn) {
            const rows = document.querySelectorAll('.patient-row');
            if (rows.length > 1) {
                btn.closest('.patient-row').remove();
                updateRowNumbers();
            } else {
                alert("CANNOT REMOVE THE LAST ROW.");
            }
        }

        function updateRowNumbers() {
            const rows = document.querySelectorAll('.patient-row');
            rows.forEach((row, index) => {
                row.querySelector('.numbering').innerText = (index + 1) + ".";
            });
            document.getElementById('totInvoices').innerText = rows.length;
        }

        // --- FORM VALIDATION ---
        function validateForm() {
            const dateVal = document.getElementById('valDate').value;
            const locVal = document.getElementById('valLocation').value.trim();
            const procVal = document.getElementById('valProcessor').value.trim();

            if (!dateVal) { 
                alert("PLEASE SELECT A DATE."); 
                document.getElementById('valDate').focus(); 
                return false; 
            }
            if (!locVal) { 
                alert("PLEASE ENTER A LOCATION."); 
                document.getElementById('valLocation').focus(); 
                return false; 
            }
            if (!procVal) { 
                alert("PLEASE ENTER PROCESSED BY."); 
                document.getElementById('valProcessor').focus(); 
                return false; 
            }

            const rows = document.querySelectorAll('.patient-row');
            for (let i = 0; i < rows.length; i++) {
                const nameInput = rows[i].querySelector('.in-name');
                const agencyInput = rows[i].querySelector('.in-agency');
                const pType = rows[i].querySelector('.in-payment-type').value;
                const amountInput = rows[i].querySelector('.in-amount');

                if (!nameInput.value.trim()) { 
                    alert(`PLEASE ENTER PATIENT NAME ON ROW ${i + 1}.`); 
                    nameInput.focus(); 
                    return false; 
                }
                if (!agencyInput.value.trim()) { 
                    alert(`PLEASE ENTER AGENCY ON ROW ${i + 1}.`); 
                    agencyInput.focus(); 
                    return false; 
                }
                if (pType === "WITH EXCESS" && (!amountInput.value.trim() || parseFloat(amountInput.value) <= 0)) {
                    alert(`PLEASE ENTER A VALID EXCESS AMOUNT ON ROW ${i + 1}.`); 
                    amountInput.focus(); 
                    return false; 
                }
            }
            return true;
        }

        // --- EXECUTE ACTIONS WITH VALIDATION ---
        function executeAction(actionType) {
            if (!validateForm()) {
                return; // Stop if validation fails
            }

            if (actionType === 'copy') {
                copyDetails();
            } else if (actionType === 'pdf') {
                window.print();
            }
        }

        // --- COPY TO CLIPBOARD ---
        function copyDetails() {
            const rawDate = document.getElementById('valDate').value;
            const formattedDate = new Date(rawDate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();
            
            const loc = document.getElementById('valLocation').value.toUpperCase();
            const processor = document.getElementById('valProcessor').value.toUpperCase();
            const courier = document.getElementById('valCourier').value.toUpperCase();

            let text = `FINAL LIST FOR DELIVERY\n\n`;
            text += `DATE: ${formattedDate}\n`;
            text += `LOCATION: ${loc}\n`;
            text += `PROCESSED BY: ${processor}\n`;
            text += `SEND VIA: ${courier}\n\n`;
            text += `PATIENT LIST:\n`;
            text += `-------------------------------------------------\n`;

            const rows = document.querySelectorAll('.patient-row');

            rows.forEach((row, index) => {
                const name = row.querySelector('.in-name').value.toUpperCase();
                const agency = row.querySelector('.in-agency').value.toUpperCase();
                const pType = row.querySelector('.in-payment-type').value;
                
                let amountText = "";
                if (pType === "WITH EXCESS") {
                    const amt = parseFloat(row.querySelector('.in-amount').value);
                    amountText = `- WITH EXCESS PAYMENT (PHP ${amt.toFixed(2)})`;
                } else {
                    amountText = `- NO EXCESS PAYMENT`;
                }

                text += `${index + 1}. ${name} (${agency}) ${amountText}\n`;
            });

            text += `-------------------------------------------------\n`;
            text += `TOTAL INVOICES: ${rows.length}\n\n`;
            text += `NOTES: DIRECT/GL PATIENTS SHOULD HAVE OFFICIAL RECEIPT OR COLLECTION RECEIPT ATTACHED ON SALES INVOICE.`;

            navigator.clipboard.writeText(text).then(() => {
                alert("✅ SUCCESSFULLY COPIED TO CLIPBOARD!");
            }).catch(err => {
